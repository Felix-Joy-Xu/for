name: 魔搭评论爬虫

# 每天 UTC 18:23（北京时间 02:23）自动运行，也可手动触发。
# 进度通过 Actions Cache 跨运行保存；数据产物通过 Artifacts 下载。

on:
  workflow_dispatch:
  schedule:
    - cron: "23 18 * * *"

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 安装依赖
        run: pip install requests

      - name: 恢复全量清单缓存（若有）
        uses: actions/cache/restore@v4
        with:
          path: modelscope_output
          key: ms-models-bridge-${{ github.run_id }}
          restore-keys: |
            ms-models-

      - name: 恢复爬取进度缓存
        uses: actions/cache@v4
        with:
          path: modelscope_output
          key: ms-comments-${{ github.run_id }}
          restore-keys: ms-comments-
          save-always: true

      - name: 首次运行解包种子数据
        run: |
          if [ ! -f modelscope_output/models_all.json ]; then
            tar -xzf seed/modelscope_seed.tar.gz
            echo "seed extracted"
          else
            echo "cache hit, skip seed"
          fi

      - name: 运行评论爬虫（断点续爬）
        run: python crawl_ms_comments_api.py

      - name: 上传数据产物
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ms-comments-run${{ github.run_number }}
          path: |
            modelscope_output/ms_comments_all.jsonl
            modelscope_output/state_ms_comments.json
          retention-days: 30

      # 生成轻量 progress.json 并回写仓库，供本地看板每小时读取
      - name: 生成并回写进度文件
        if: always()
        run: |
          python - <<'EOF'
          import json, os, datetime
          base = "modelscope_output"
          done = total = errors = 0
          try:
              with open(os.path.join(base, "state_ms_comments.json"), encoding="utf-8") as f:
                  done = len(json.load(f))
          except Exception as e:
              print("state 读取失败:", e)
          try:
              src = "models_full.json" if os.path.exists(os.path.join(base, "models_full.json")) else "models_all.json"
              with open(os.path.join(base, src), encoding="utf-8") as f:
                  total = len(json.load(f))
          except Exception as e:
              print("models 读取失败:", e)
          try:
              with open(os.path.join(base, "ms_comments_all.jsonl"), encoding="utf-8") as f:
                  for line in f:
                      if '"status": "error"' in line or '"status":"error"' in line:
                          errors += 1
          except Exception as e:
              print("jsonl 读取失败:", e)
          prog = {
              "done": done,
              "total": total,
              "errors": errors,
              "updatedAt": datetime.datetime.now(datetime.timezone.utc).isoformat(),
          }
          with open("progress.json", "w", encoding="utf-8") as f:
              json.dump(prog, f, ensure_ascii=False, indent=1)
          print(prog)
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add progress.json
          git diff --cached --quiet || git commit -m "data: 评论爬虫进度 $(date -u '+%F %H:%M')"
          git pull --rebase origin main || true
          git push || echo "::warning::progress.json 推送失败，下次运行会重试"
