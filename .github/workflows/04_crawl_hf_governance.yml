name: 04 - HF 治理文档

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install requests beautifulsoup4
      - run: python crawl_hf_governance.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hf-governance
          path: modelscope_output/hf_governance/
          retention-days: 30
