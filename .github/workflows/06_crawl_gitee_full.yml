name: 06 - Gitee 全量行为数据

permissions:
  actions: read
  contents: write

on:
  workflow_dispatch:
    inputs:
      select_run_id:
        description: '05 - Gitee 仓库选择 的 run id（留空则自动下载最新 gitee-selected artifact）'
        required: false
        default: ''
  workflow_run:
    workflows: ["05 - Gitee 仓库选择"]
    types:
      - completed

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.set.outputs.repos }}
    steps:
      - uses: actions/checkout@v4

      - name: 下载 Gitee 选仓结果
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: 05_crawl_gitee_select.yml
          name: gitee-selected
          path: modelscope_output
          if_no_artifact_found: fail
          run_id: ${{ github.event.inputs.select_run_id || '' }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - id: set
        run: |
          python - <<'EOF'
          import json, os
          path = "modelscope_output/gitee_selected_repos.json"
          repos = []
          if os.path.exists(path):
              try:
                  with open(path, encoding="utf-8") as f:
                      selected = json.load(f)
                  repos = [f"{s['owner']}/{s['repo']}" for s in selected if s.get("selected")]
              except Exception as e:
                  print("parse error:", e)
          repos_json = json.dumps(repos)
          print("repos=" + repos_json)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"repos={repos_json}\n")
          EOF

  crawl-repo:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.prepare.outputs.repos) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install requests
      - uses: actions/cache@v4
        with:
          path: |
            modelscope_output
            02-原始数据/各平台原始数据/gitee_raw
          key: gitee-${{ matrix.repo }}-${{ github.run_id }}
          restore-keys: gitee-${{ matrix.repo }}-
          save-always: true
      - name: 采集单仓库数据
        run: |
          python crawl_gitee.py --only-repo "${{ matrix.repo }}" --since 2020-01-01
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_TOKENS: ${{ secrets.GITEE_TOKENS }}
      - name: 生成合法 artifact 名
        id: artifact-name
        run: |
          SAFE_NAME=$(echo "${{ matrix.repo }}" | tr '/' '-')
          echo "name=gitee-raw-$SAFE_NAME" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: 02-原始数据/各平台原始数据/gitee_raw/
          retention-days: 30
